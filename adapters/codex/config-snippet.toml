# ser — Codex adapter. Append to ~/.codex/config.toml (or a repo .codex/config.toml).
# Codex's Stop hook passes `last_assistant_message` (the claim) which ser consumes
# directly. `ser` must be on PATH. Codex requires hook trust the first time (review the
# hook, or run with --dangerously-bypass-hook-trust for vetted automation, or ship as a
# managed hook via requirements.toml so it is trusted by policy).
#
# NOTE: the exact hook table schema is codex-version-specific (v0.142 here). Verify
# against your `codex` version's config reference; the shape below is the documented
# [[hooks.<Event>]] command form.

[[hooks.Stop]]
type = "command"
command = "ser hook-stop"

[[hooks.UserPromptSubmit]]
type = "command"
command = "ser hook-prompt"
