name: Release

# Tag-gated npm publish (SPEC.md §3/§6.12 "npm publish on version tag"):
#   1. `tag` job (push to main): when package.json's `version` is bumped and its
#      `v<version>` tag doesn't exist yet, verifies the full gate, then creates
#      + pushes the tag and reports `tagged=true`.
#   2. `publish` job: runs EITHER off a real `v*` tag push (manual/retry path)
#      OR off `needs.tag` in the same run. The same-run path exists because a
#      tag pushed with the default GITHUB_TOKEN never triggers a new workflow
#      run (GitHub recursive-workflow prevention) — the original two-hop design
#      tagged v0.2.0-rc.1 and then the publish leg silently never fired. Either
#      way it checks out the exact tag ref, re-verifies the gate there, and
#      publishes; npm publish only ever happens for a commit a `v*` tag points at.
#   - stable  (e.g. 0.2.0)      → npm dist-tag `latest`
#   - prerelease (0.2.0-rc.1)   → npm dist-tag `next`, GitHub prerelease
# Idempotent: re-pushing main without a version bump finds the tag already
# exists and is a no-op; a tag whose version doesn't match package.json (a
# manually-pushed stray tag) is refused rather than published.
#
# Requires repo secret NPM_TOKEN (npm automation token with publish rights) —
# absent, both jobs still run the full gate and cleanly skip publishing (green,
# not red).

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "src/**"
      - "adapters/**"
      - ".claude-plugin/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/release.yml"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create tags + releases
  id-token: write # npm provenance (sigstore)

jobs:
  tag:
    if: startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-latest
    outputs:
      tagged: ${{ steps.push.outputs.tagged }}
      version: ${{ steps.read.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # need tags to check idempotency
      - uses: pnpm/action-setup@v6
        with:
          version: 8.15.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24 # floor: node:sqlite (src/goose.ts) needs Node >=24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test
      - run: pnpm check:plugin

      - name: Read version + decide
        id: read
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v$VERSION already exists — nothing to tag."
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push the version tag (publish runs via needs.tag in this same run)
        id: push
        if: steps.read.outputs.tag_exists == 'false'
        run: |
          set -euo pipefail
          V="v${{ steps.read.outputs.version }}"
          git tag "$V"
          git push origin "$V"
          echo "tagged=true" >> "$GITHUB_OUTPUT"

  publish:
    needs: [tag]
    if: >-
      always() && !cancelled() &&
      (startsWith(github.ref, 'refs/tags/v') || needs.tag.outputs.tagged == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Tag-push path: the tag ref itself. Same-run path: the tag the `tag`
          # job just pushed — never the moving branch head.
          ref: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', needs.tag.outputs.version) }}
      - uses: pnpm/action-setup@v6
        with:
          version: 8.15.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24 # floor: node:sqlite (src/goose.ts) needs Node >=24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile

      # Re-run the full gate at the exact tagged commit — don't trust out-of-band CI.
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test
      - run: pnpm check:plugin

      - name: Read version + decide
        id: read
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG_REF="${GITHUB_REF#refs/tags/}"
          else
            TAG_REF="v${{ needs.tag.outputs.version }}"
          fi
          if [[ "$TAG_REF" != "v$VERSION" ]]; then
            echo "::error::tag $TAG_REF does not match package.json version v$VERSION — refusing to publish"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "dist_tag=next"     >> "$GITHUB_OUTPUT"
            echo "prerelease=true"   >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest"   >> "$GITHUB_OUTPUT"
            echo "prerelease=false"  >> "$GITHUB_OUTPUT"
          fi
          # No NPM_TOKEN configured yet → cleanly skip publishing (green, not red).
          echo "has_token=${{ secrets.NPM_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

      - name: Skip notice (no NPM_TOKEN)
        if: steps.read.outputs.has_token != 'true'
        run: echo "::notice::NPM_TOKEN not set — gate passed, publishing skipped. Add the secret to enable npm release."

      - name: Publish to npm
        if: steps.read.outputs.has_token == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public --tag ${{ steps.read.outputs.dist_tag }}

      - name: GitHub release
        if: steps.read.outputs.has_token == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          V="v${{ steps.read.outputs.version }}"
          if [[ "${{ steps.read.outputs.prerelease }}" == "true" ]]; then
            gh release create "$V" --title "$V" --generate-notes --prerelease
          else
            gh release create "$V" --title "$V" --generate-notes
          fi
